[package]
name = "astrid-capsule-react"
version = "0.1.0"
description = "ReAct loop: stateless coordinator for LLM reasoning and tool execution"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "react"
file = "astrid_capsule_react.wasm"
type = "executable"

# User input from frontends (CLI, Telegram, etc.)
[[interceptor]]
event = "user.v1.prompt"
action = "handle_user_prompt"

# System prompt returned by the identity capsule
[[interceptor]]
event = "identity.v1.response.ready"
action = "handle_identity_response"

# Assembled prompt returned by the prompt builder capsule
[[interceptor]]
event = "prompt_builder.v1.response.assemble"
action = "handle_prompt_response"

# LLM streaming events from any provider capsule
[[interceptor]]
event = "llm.v1.stream.*"
action = "handle_llm_stream"

# Tool execution results from the tool router
[[interceptor]]
event = "tool.v1.execute.result"
action = "handle_tool_result"

# Active model changed by the registry capsule
[[interceptor]]
event = "registry.v1.active_model_changed"
action = "handle_model_changed"

# Periodic watchdog tick from the kernel for timeout enforcement
[[interceptor]]
event = "astrid.v1.watchdog.tick"
action = "handle_watchdog_tick"

# Event bus broadcast lag notification from the dispatcher
[[interceptor]]
event = "astrid.v1.event_bus.lagged"
action = "handle_bus_lag"

# Lifecycle restart signal from the kernel (ephemeral key cleanup)
[[interceptor]]
event = "system.v1.lifecycle.restart"
action = "handle_lifecycle_restart"

# Session clear request from frontends
[[interceptor]]
event = "session.v1.clear"
action = "handle_session_clear"

[dependencies]
requires = [
    "topic:identity.v1.response.ready",
    "topic:session.v1.response.get_messages",
]

# Guest-initiated subscriptions (ACL-gated via ipc_subscribe below):
#   session.v1.response.get_messages.<correlation_id>  <- covered by session.v1.response.get_messages.*
#   session.v1.response.clear.<correlation_id>          <- covered by session.v1.response.clear.*

[capabilities]
ipc_publish = [
    "identity.v1.request.build",
    "prompt_builder.v1.assemble",
    "agent.v1.stream.delta",
    "agent.v1.response",
    "agent.v1.session_changed",
    "tool.v1.request.execute",
    "tool.v1.request.cancel",
    "llm.v1.request.generate.*",
    "session.v1.request.get_messages",
    "session.v1.request.clear",
]
ipc_subscribe = [
    "session.v1.response.get_messages.*",
    "session.v1.response.clear.*",
]
